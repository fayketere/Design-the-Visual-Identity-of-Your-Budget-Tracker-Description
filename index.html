<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Budget Tracker</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Heading Card -->
    <header class="card">
        <h1>Budget Tracker</h1>
        <p>Track your daily expenses and manage your finances.</p>
    </header>

    <!-- Add Expense Card -->
    <section class="card">
        <h2>Add Expense</h2>

        <form>

            <label for="expense">Expense Name</label>
            <input type="text" id="expense" placeholder="Enter expense">

            <label for="category">Category</label>
            <select id="category">
                <option>Food</option>
                <option>Transport</option>
                <option>Rent</option>
                <option>Shopping</option>
                <option>Entertainment</option>
            </select>

            <label for="amount">Amount (KES)</label>
            <input type="number" id="amount" placeholder="Enter amount">

            <button type="submit">Add Expense</button>

        </form>
    </section>

    <!-- Expense Table Card -->
    <section class="card">
        <h2>Expense History</h2>

        <table>

            <thead>
                <tr>
                    <th>Date</th>
                    <th>Expense</th>
                    <th>Category</th>
                    <th>Amount (KES)</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>18 Jul 2026</td>
                    <td>Groceries</td>
                    <td>Food</td>
                    <td>2,500</td>
                </tr>

                <tr>
                    <td>17 Jul 2026</td>
                    <td>Bus Fare</td>
                    <td>Transport</td>
                    <td>500</td>
                </tr>

                <tr>
                    <td>16 Jul 2026</td>
                    <td>Movie Ticket</td>
                    <td>Entertainment</td>
                    <td>1,200</td>
                </tr>

                <tr>
                    <td>15 Jul 2026</td>
                    <td>Electricity</td>
                    <td>Utilities</td>
                    <td>3,100</td>
                </tr>

            </tbody>

        </table>

    </section>

</body>
</html>
